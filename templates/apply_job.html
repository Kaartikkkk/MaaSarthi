<!DOCTYPE html>
<html lang="en">
<head>
    <title>Apply for {{ job.title }} | MaaSarthi</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <style>
        .apply-container {
            max-width: 800px;
            margin: 100px auto 40px;
            padding: 20px;
        }
        .apply-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }
        .job-summary {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary-pink);
        }
        .job-summary h2 {
            margin: 0;
            color: var(--primary-dark);
            font-size: 1.5rem;
        }
        .job-summary p {
            margin: 5px 0 0;
            color: #666;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-pink);
        }
        .help-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }
        .btn-submit {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3);
        }
    </style>
</head>
<body>
    {% include '_navbar.html' %}

    <div class="apply-container">
        <div class="apply-card">
            <div class="job-summary">
                <h2>Applying for: {{ job.title }}</h2>
                <p>Organization: {{ job.organization.company_name }}</p>
                <div style="margin-top: 10px; font-size: 0.9rem; color: #777;">
                    <span>{{ job.job_type }}</span> • <span>{{ job.work_mode }}</span> • <span>{{ job.location }}</span>
                </div>
            </div>

            <form action="{{ url_for('apply_job', job_id=job.id) }}" method="POST" enctype="multipart/form-data">
                <div class="form-section">
                    <label class="form-label" for="full_name">Full Name *</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" value="{{ user.name }}" required>
                </div>

                <div class="form-section">
                    <label class="form-label" for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-control" value="{{ user.email }}" required>
                </div>

                <div class="form-section">
                    <label class="form-label" for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" class="form-control" value="{{ user.phone }}" required>
                </div>

                <div class="form-section">
                    <label class="form-label" for="resume">Upload Resume (PDF/DOC/DOCX) *</label>
                    <input type="file" id="resume" name="resume" class="form-control" accept=".pdf,.doc,.docx" required>
                    <p class="help-text">Max file size: 5MB</p>
                </div>

                <div class="form-section">
                    <label class="form-label" for="cover_letter">Cover Letter / Message (Optional)</label>
                    <textarea id="cover_letter" name="cover_letter" class="form-control" rows="5" placeholder="Tell the employer why you are a good fit..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Application</button>
            </form>
        </div>
    </div>

    {% include 'chatbot.html' %}
</body>
</html>
