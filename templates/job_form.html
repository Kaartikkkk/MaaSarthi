<!DOCTYPE html>
<html>
<head>
    <title>{{ t.find_jobs }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">


</head>
<body>

<div class="page-wrap">

    <div class="top-mini">
        <a class="back-link" href="/">← {{ t.back }}</a>
    </div>

    <div class="form-card">
        <h2>{{ t.job_heading }}</h2>
        <p>{{ t.job_sub }}</p>

        <form action="/predict" method="POST" class="grid-form">

            <div class="field">
                <label>{{ t.age }}</label>
                <input type="number" name="age" placeholder="28" required>
            </div>
            <div class="field">
  <label>{{ t.language }}</label>
  <select name="language" required>
      <option value="">{{ t.select }}</option>
      <option value="Hindi">Hindi</option>
      <option value="English">English</option>
      <option value="Both">Both</option>
  </select>
</div>


            <div class="field">
                <label>{{ t.kids }}</label>
                <input type="number" name="kids" placeholder="0-4" required>
            </div>

            <div class="field">
                <label>{{ t.hours }}</label>
                <input type="number" name="hours" placeholder="3" required>
            </div>

            <div class="field">
                <label>{{ t.domain }}</label>
                <select name="domain" required>
                    <option value="">{{ t.select }}</option>
                    <option value="Cooking">{{ t.domains["Cooking"] }}</option>
                    <option value="Baking">{{ t.domains["Baking"] }}</option>
                    <option value="Teaching">{{ t.domains["Teaching"] }}</option>
                    <option value="Commerce">{{ t.domains["Commerce"] }}</option>
                    <option value="Law">{{ t.domains["Law"] }}</option>
                    <option value="Cleaning">{{ t.domains["Cleaning"] }}</option>
                    <option value="Gardening">{{ t.domains["Gardening"] }}</option>
                    <option value="Data Entry">{{ t.domains["Data Entry"] }}</option>
                    <option value="Social Media">{{ t.domains["Social Media"] }}</option>
                    <option value="E-Commerce">{{ t.domains["E-Commerce"] }}</option>
                    <option value="Clothing">{{ t.domains["Clothing"] }}</option>
                    <option value="Beauty">{{ t.domains["Beauty"] }}</option>
                    <option value="Banking">{{ t.domains["Banking"] }}</option>
                    <option value="Security">{{ t.domains["Security"] }}</option>
                    <option value="Music">{{ t.domains["Music"] }}</option>
                    <option value="Electrician">{{ t.domains["Electrician"] }}</option>
                    <option value="Handicraft">{{ t.domains["Handicraft"] }}</option>
                    <option value="Fitness">{{ t.domains["Fitness"] }}</option>
                    <option value="IT">{{ t.domains["IT"] }}</option>
                </select>
            </div>

            <div class="field">
                <label>{{ t.main_skill }}</label>
                <input type="text" name="skill" placeholder="Baking / Excel / Stitching" required>
            </div>

            <div class="field">
                <label>{{ t.education }}</label>
                <select name="education" required>
                    <option value="">{{ t.select }}</option>
                    <option value="No Formal">{{ t.education_list["No Formal"] }}</option>
                    <option value="8th">{{ t.education_list["8th"] }}</option>
                    <option value="10th">{{ t.education_list["10th"] }}</option>
                    <option value="12th">{{ t.education_list["12th"] }}</option>
                    <option value="Diploma">{{ t.education_list["Diploma"] }}</option>
                    <option value="UG">{{ t.education_list["UG"] }}</option>
                    <option value="PG">{{ t.education_list["PG"] }}</option>
                </select>
            </div>

            <div class="field">
                <label>{{ t.city_type }}</label>
                <select name="city_type" required>
                    <option value="">{{ t.select }}</option>
                    <option value="Urban">{{ t.city_list["Urban"] }}</option>
                    <option value="Semi-Urban">{{ t.city_list["Semi-Urban"] }}</option>
                    <option value="Rural">{{ t.city_list["Rural"] }}</option>
                </select>
            </div>

            <div class="field">
                <label>{{ t.device }}</label>
                <select name="device" required>
                    <option value="">{{ t.select }}</option>
                    <option value="Mobile">{{ t.device_list["Mobile"] }}</option>
                    <option value="Laptop">{{ t.device_list["Laptop"] }}</option>
                    <option value="Both">{{ t.device_list["Both"] }}</option>
                </select>
            </div>

            <div class="field">
                <label>{{ t.work_mode }}</label>
                <select name="work_mode" required>
                    <option value="">{{ t.select }}</option>
                    <option value="Work From Home">{{ t.workmode_list["Work From Home"] }}</option>
                    <option value="Hybrid">{{ t.workmode_list["Hybrid"] }}</option>
                    <option value="Offline Local">{{ t.workmode_list["Offline Local"] }}</option>
                </select>
            </div>

            <div class="full">
                <div class="button-group">
                    <button class="btn btn-primary" type="submit">{{ t.get_rec }}</button>
                    <a class="btn btn-secondary" href="/skills">{{ t.train_instead }}</a>
                </div>
            </div>

        </form>
    </div>

</div>



</body>
</html>
