<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ t.title }} | {{ t.find_jobs }}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Images/favicon.png') }}">
    <!-- Modular CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>
<!-- Chatbot removed -->


<body>

{% include '_navbar.html' %}

<div class="page-wrap" style="padding-top: 80px;">

    <div class="top-mini">
        <a href="/" class="back-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;vertical-align:middle;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>{{ t.back }}</a>
        <span class="chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="margin-right:6px;vertical-align:middle;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>{{ t.find_jobs }}</span>
    </div>

    <div class="form-card">
        <h2>{{ t.job_heading }}</h2>
        <p>{{ t.job_sub }}</p>

        <form action="/predict" method="POST">
            <div class="grid-form">

                <div class="field">
                    <label>{{ t.age }}</label>
                    <input type="number" name="age" placeholder="e.g. 22" required>
                </div>

                <div class="field">
                    <label>{{ t.kids }}</label>
                    <input type="number" name="kids" placeholder="0 - 4" required>
                </div>

                <div class="field">
                    <label>{{ t.hours }}</label>
                    <input type="number" name="hours" placeholder="e.g. 2" required>
                </div>

                <div class="field">
                    <label>{{ t.domain }}</label>
                    <select name="domain" required>
                        <option value="">{{ t.choose }}</option>

                        <!-- ✅ Domain options bilingual -->
                        {% for d in t.domain_list %}
                          <option value="{{ d }}">{{ d }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field full">
                    <label>{{ t.main_skill }}</label>
                    <input type="text" name="skill" placeholder="e.g. Excel, Baking, Stitching" required>
                </div>

                <div class="field">
                    <label>{{ t.education }}</label>
                    <select name="education" required>
                        <option value="">{{ t.choose }}</option>

                        {% for key, value in t.education_list.items() %}
                          <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label>{{ t.city_type }}</label>
                    <select name="city_type" required>
                        <option value="">{{ t.choose }}</option>

                        {% for key, value in t.city_type_list.items() %}
                          <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label>{{ t.language }}</label>
                    <select name="language" required>
                        <option value="">{{ t.choose }}</option>

                        {% for key, value in t.language_list.items() %}
                          <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label>{{ t.device }}</label>
                    <select name="device" required>
                        <option value="">{{ t.choose }}</option>

                        {% for key, value in t.device_list.items() %}
                          <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field full">
                    <label>{{ t.work_mode }}</label>
                    <select name="work_mode" required>
                        <option value="">{{ t.choose }}</option>

                        {% for key, value in t.work_mode_list.items() %}
                          <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field full">
                    <label>{{ t.location_optional }}</label>
                    <input type="text" name="location" placeholder="e.g. Greater Noida, Delhi">
                </div>

                <div class="field full">
                    <button class="btn" type="submit">{{ t.get_rec }}</button>
                    <a class="btn-outline" href="/skills">{{ t.train_instead }}</a>
                </div>

            </div>
        </form>
    </div>

</div>

<script src="{{ url_for('static', filename='js/animations.js') }}"></script>

</body>
</html>
