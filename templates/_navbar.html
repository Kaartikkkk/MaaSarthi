<!-- Universal Navbar Component -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-icon" alt="MaaSarthi Logo">
                <span class="logo-text">MaaSarthi</span>
            </a>
        </div>
        
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('jobs') }}" class="nav-link {% if request.endpoint in ['jobs', 'result'] %}active{% endif %}">Find Jobs</a>
            <a href="{{ url_for('skills') }}" class="nav-link {% if request.endpoint in ['skills', 'skills_result'] %}active{% endif %}">Train a Skill</a>
            <a href="/#about" class="nav-link">About Us</a>
            <a href="{{ url_for('contact') }}" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">Contact</a>
            
            <!-- Language Switcher -->
            <div class="lang-switch">
                <a class="lang-btn {% if session.get('lang', 'en') == 'en' %}active{% endif %}" href="/set-language/en">English</a>
                <a class="lang-btn {% if session.get('lang') == 'hi' %}active{% endif %}" href="/set-language/hi">हिंदी</a>
            </div>
            
            {% if user %}
            <!-- Logged in - Show Profile Dropdown -->
            <div class="profile-dropdown">
                <button class="profile-btn" onclick="toggleDropdown()">
                    <span class="profile-avatar">{{ user.initials }}</span>
                    <span class="profile-name">{{ user.name.split()[0] if user.name else 'User' }}</span>
                    <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-header">
                        <span class="dropdown-avatar">{{ user.initials }}</span>
                        <div class="dropdown-info">
                            <span class="dropdown-name">{{ user.name }}</span>
                            <span class="dropdown-email">{{ user.email }}</span>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('dashboard') }}" class="dropdown-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Dashboard
                    </a>
                    <a href="{{ url_for('jobs') }}" class="dropdown-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        Find Jobs
                    </a>
                    <a href="{{ url_for('skills') }}" class="dropdown-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        Train Skills
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('logout') }}" class="dropdown-item dropdown-logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </a>
                </div>
            </div>
            {% else %}
            <!-- Not logged in - Show Login/Signup -->
            <div class="auth-buttons">
                <a href="{{ url_for('login') }}" class="btn-login">Login</a>
                <a href="{{ url_for('signup') }}" class="btn-signup">Sign Up</a>
            </div>
            {% endif %}
        </div>
    </div>
</nav>

<script>
function toggleDropdown() {
    const menu = document.getElementById('dropdownMenu');
    menu.classList.toggle('show');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    const dropdown = document.querySelector('.profile-dropdown');
    const menu = document.getElementById('dropdownMenu');
    if (dropdown && menu && !dropdown.contains(e.target)) {
        menu.classList.remove('show');
    }
});
</script>
